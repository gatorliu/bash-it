name: Sync Upstream Master Branch

on:
  schedule:
    # 每天台灣時間 00:00 執行 (UTC 16:00)
    - cron: '0 16 * * *'
  workflow_dispatch: # 方便你隨時手動測試

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync upstream master branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 指定upstream default branch (main) 同步 ups_master 分支
          gh repo sync gatorliu/bash-it --source bash-it/bash-it --branch ups_master